# Plugin manifest consumed by butter-agent at startup.
#
# Required keys:
# - [plugin].name: stable identifier the agent uses to reference this
#   plugin in task plans. Must be unique across loaded plugins.
# - [plugin].version: semver string for diagnostics and version pinning.
# - [plugin].entrypoint: `module:Class` import path resolving to a class
#   implementing the `Plugin` Protocol (`butter_agent.plugin_api.Plugin`).
# - [plugin].blast_radius: one of "read-only", "local-write", "network".
#   The host's `core.max_blast_radius` rejects anything broader. The
#   filesystem plugin writes, edits, and (when the operator enables it)
#   deletes files on local disk, so the *plugin* is "local-write" — the
#   tier covers its most destructive capability; read/navigate/search
#   ride under the same declared radius (blast_radius is plugin-level).
# - [[capability]]: at least one entry. Each declares a name, a
#   one-sentence description (surfaced to the model), and JSON-schema-ish
#   input/output shapes. Only keys in input_schema are *required* by the
#   task executor — optional inputs (e.g. `offset`, `limit`) are accepted
#   but deliberately omitted from the schema so they stay optional.
#
# No `requires`: this plugin is filesystem-backed, not database-backed.
# It never calls another plugin via PluginContext.call. Destructive
# capabilities (write/edit/delete) are gated by the planner per step
# (the manifest carries no gate — gate is a plan concern enforced by the
# host's core) and, for `delete`, additionally by an operator config flag
# read via PluginContext.config (see README "Delete safety").

[plugin]
name = "filesystem"
version = "0.1.0"
entrypoint = "butter_plugin_filesystem:FilesystemPlugin"
blast_radius = "local-write"

[[capability]]
name = "pwd"
description = "Report the plugin's current working directory (the base relative paths resolve against)."
input_schema = {}
output_schema = { cwd = "string" }

[[capability]]
name = "cd"
description = "Change the current working directory to `path` (absolute, or relative to the current cwd; `~` is expanded). Fails if the target does not exist or is not a directory."
input_schema = { path = "string" }
output_schema = { cwd = "string" }

[[capability]]
name = "list_dir"
description = "List the entries of a directory — optional `path` (absolute or relative to cwd; defaults to the current cwd). Each entry reports its name, type (file/dir/symlink/other), and size in bytes."
input_schema = {}
output_schema = { path = "string", entries = "array" }

[[capability]]
name = "stat"
description = "Report metadata for one filesystem path: its resolved absolute path, type (file/dir/symlink/other), size in bytes, and last-modified time (ISO-8601)."
input_schema = { path = "string" }
output_schema = { path = "string", type = "string", size = "integer", mtime = "string" }

[[capability]]
name = "read_file"
description = "Read a UTF-8 text file at `path` (absolute or relative to cwd). Optional `offset` (0-based start line) and `limit` (max lines) read a slice of large files. Reports whether the returned content was truncated. Fails on a non-UTF-8 (binary) file."
input_schema = { path = "string" }
output_schema = { path = "string", content = "string", lines = "integer", truncated = "boolean" }

[[capability]]
name = "write_file"
description = "Create or overwrite the file at `path` (absolute or relative to cwd) with `content`, written atomically (a sibling temp file is renamed into place, so a reader never sees a half-written file). The parent directory must already exist; the target must not be an existing directory. Destructive — the planner should gate this `confirm`."
input_schema = { path = "string", content = "string" }
output_schema = { path = "string", bytes_written = "integer" }

[[capability]]
name = "edit_file"
description = "Replace an exact substring in the UTF-8 text file at `path`. `old` must occur EXACTLY ONCE in the file (fails if it is absent or appears more than once — make `old` long enough to be unique by including surrounding context); it is replaced with `new` (which may be empty to delete the text). The file is rewritten atomically. Destructive — the planner should gate this `confirm`."
input_schema = { path = "string", old = "string", new = "string" }
output_schema = { path = "string", replaced = "integer" }

[[capability]]
name = "find_files"
description = "Find files by name using a glob `pattern` (e.g. `*.py`, `test_*`). Optional `path` is the directory to search (absolute or relative to cwd; defaults to cwd) and `limit` caps results. Uses `fd` when available (.gitignore-aware), else a stdlib directory walk (skips .git and common build/VCS dirs). Returns absolute paths."
input_schema = { pattern = "string" }
output_schema = { paths = "array", backend = "string" }

[[capability]]
name = "search_content"
description = "Search file contents for `query` (a regular expression), grep-style. Optional `path` is the directory to search (defaults to cwd), `glob` filters which files by name (e.g. `*.py`), and `limit` caps the number of matching lines. Uses `ripgrep` when available (.gitignore-aware), else a stdlib walk + regex scan. Returns matches as {path, line, text}."
input_schema = { query = "string" }
output_schema = { matches = "array", backend = "string" }

[[capability]]
name = "delete"
description = "Delete the file or directory at `path`. DISABLED unless the operator set `allow_delete = true` in this plugin's config (the model cannot enable it). Pass `dry_run: true` to preview the resolved absolute target and entry count WITHOUT deleting — chain this before the real delete. The planner MUST gate the real delete `human` so the operator sees the resolved target first. A non-empty directory needs BOTH `recursive: true` and the operator's `allow_recursive_delete = true`. Refuses protected paths (filesystem root, home, the working dir or its ancestors, shallow system paths). By default the target is moved to a `.butter-trash/` (recoverable), not hard-deleted."
input_schema = { path = "string" }
output_schema = { path = "string", trashed = "boolean", recursive = "boolean", dry_run = "boolean" }
